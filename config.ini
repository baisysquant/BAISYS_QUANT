# ============================================================
# 📊 业务配置
# ============================================================


[USER_FOCUS_STOCKS]
# ── 用户关注股池 ──
# 关注的股票代码列表，用竖线 | 分隔，不需要 SZ/SH 前缀
# 示例：user_focus_stocks = 000001|000002|600000
# 这些股票在生成的 Excel 报告中将高亮置顶显示
user_focus_stocks = 002517|002206|600312|002415|603225


[TECHNICAL_INDICATORS]
# ── 技术指标参数 ──
# MACD 参数（快线周期,慢线周期,信号线周期）
# [短线敏感]  6,13,5   — 信号响应最快，适合短线交易
# [中线均衡] 12,26,9   — 经典默认配置，适合中长线
# [长线趋势] 24,52,18  — 周线级别趋势跟踪
macd_params = 12,26,9


[TECHNICAL_CONSTANTS]
# ── 标准技术指标周期 ──
# 以下为行业标准参数，一般无需修改。放在此处仅为了统一调参入口
atr_length = 14          # ATR 计算周期（Wilder 标准）
adx_length = 14          # ADX 计算周期（Wilder 标准）
rsi_length = 14          # RSI 计算周期（Wilder 标准）
boll_length = 20         # BOLL 计算周期（Bollinger 标准）
boll_std = 2             # BOLL 标准差倍数
stoch_k = 9              # Stoch %K 周期（Lane 标准）
stoch_d = 3              # Stoch %D 平滑周期（Lane 标准）
kline_scan_window = 60   # K 线形态扫描窗口（根数）


[MULTI_HEAD_ARRANGEMENT]
# ── 多头排列评分阈值 ──
# 基于 5/10/20/30/60 日均线的排列形态评分
# 分值越高表示均线发散程度越强，仅影响每日分析管线中的评分列
full_bull_threshold = 85           # 评分 ≥ 此值 → "完全主升浪"（最强多头）
trend_acceleration_threshold = 65   # 评分 ≥ 此值 → "趋势加速"
trend_oscillation_threshold = 45    # 评分 ≥ 此值 → "趋势震荡"
trend_watch_threshold = 45          # 评分 < 此值 → "趋势观望"
# 均线周期列表（用于本地计算多头排列评分）
moving_average_periods = 5,10,20,30,60


[FULL_BULL_SCORING]
# ── MACD 7 维评分权重 ──
# 权重和 < 100，量价配合为独立奖励分不占用基础权重池
# 各维度含义：
weight_zero_axis = 20       # MACD 趋势分（DIF/DEA 在零轴上方位置）
weight_strategy_golden = 15 # 金叉信号强度（DIF 上穿 DEA 的力度）
weight_momentum = 15        # 柱状动能（MACD 柱持续伸长/缩短）
weight_dif_slope = 10       # DIF 斜率（线性回归拟合方向 + R² 确定性）
weight_divergence = 10      # 背离信号（底背离加分，顶背离一票否决）
weight_volume_price = 10    # 量价配合（不依赖背离锚点的独立奖励）
weight_kline_pattern = 10   # K 线组合形态（吞没/启明星等反转信号）

# ── 综合结论阈值（基于基础评分） ──
conclusion_full_bull = 80   # 评分 ≥ 此值 → A 级（综合多头，强烈推荐）
conclusion_bullish = 60     # 评分 ≥ 此值 → B 级（偏多，可关注）
conclusion_oscillate = 40   # 评分 ≥ 此值 → C 级（多空拉锯），否则 C-（偏空）


[REGIME_DETECTION]
# ── 市场状态分类参数 ──
# 纯自定义经验值，根据回测结果调整。控制 _detect_market_regime() 的判定阈值
# NOTE: boll_narrow_ratio 已移至 [BACKTEST_CALIBRATED]
oscillation_hist_std_ratio = 0.1   # 震荡判定：柱状图绝对值 < 此值 × close.std() → 震荡
top_risk_ma20_deviation = 0.15     # 顶部风险：收盘价高于 MA20 超过此比例
oscillation_min_bars = 30           # 震荡判定所需最少 K 线数
reversal_lookback = 10              # 底/顶反转检测回溯长度（根）


[DIVERGENCE]
# ── 背离检测参数 ──
# 自研信号衰减模型，根据回测调整
base_distance = 10         # 背离检测基础窗口（以此为基数搜索极值点）
strength_threshold = 0.15  # 背离有效强度门限（低于此值不生成信号）
decay_half_life = 8        # 背离信号半衰期（天），超过后权重衰减 50%
slope_window = 5           # DIF 斜率线性回归窗口（根）


[SCORING_PARAMS]
# ── 信号衰减模型 ──
# NOTE: cross_decay_days 已移至 [BACKTEST_CALIBRATED]
cross_decay_min = 0.3       # 金叉衰减权重下限（不低于原始权重的 30%）
kline_decay_days = 10       # K 线形态衰减半衰期（天）
kline_decay_min = 0.2       # K 线形态衰减权重下限（不低于原始权重的 20%）

# ── 波动率归一化 ──
vol_norm_denominator = 0.15 # (DIF - DEA) / ATR / 此值 → vol_factor（金叉强度归一化分母）

# ── ATR 退出策略倍数 ──
# NOTE: atr_stop_mult / atr_t1_mult 已移至 [BACKTEST_CALIBRATED]
atr_t2_mult = 5.0     # T2 目标价 = close + ATR × 此倍数（第二止盈位）

# ── 移动止损 ──
trailing_stop_high_ratio = 0.98       # close ≥ 近 N 日最高 × 此值 → 激活移动止损
trailing_stop_lookback = 10           # 移动止损价 = 近 N 日最低价
trailing_stop_high_lookback = 20      # 参考高点回溯窗口（判断是否处于近期高位）

# ── 预期盈亏比 ──
expected_return_lookback = 20   # 计算预期盈亏比时取近 N 日的价格区间


[FILTER_RULES]
# ── 弱势股过滤 ──
# 自动剔除弱势且加速下跌的股票，避免踩雷
enable_weak_stock_filter = true
# 豁免级别：满足以下趋势级别的股票即使符合弱势特征也不被剔除
# 可选值：完全主升, 趋势加速, 趋势震荡, 趋势观望（可多选逗号分隔）
exempt_levels = 完全主升,趋势加速,趋势震荡,趋势观望

# ── 流动性参数（Gate 2 + Gate 4 共用） ──
# NOTE: liq_veto_ratio 已移至 [BACKTEST_CALIBRATED]
liq_w_section = 0.4       # 流动性评分截面权重（行业内排名，总和=1.0）
liq_w_timeseries = 0.4    # 流动性评分时序权重（自身缩量程度）
liq_w_marketcap = 0.2     # 流动性评分规模权重（市值因子）
liq_min_discount = 0.3    # 流动性最差时的仓位最低比例（0.3 = 打三折但不否决）


[FUND_FLOW]
# ── 资金流统计周期 ──
# 必须设置三个周期才能有效观察资金趋势
# 可选组合（仅限以下四种）：
#   3,5,10   → 短中周期组合（推荐短线交易）
#   3,5,20   → 短长周期组合（兼顾短线爆发与长线趋势）
#   5,10,20  → 中长周期组合（默认，推荐中线波段）
#   3,10,20  → 分散周期组合（捕捉多级别资金共振）
fund_flow_periods = 5,10,20


[RESEARCH_REPORT_FILTER]
# ── 研报买入评级过滤 ──
# 在全量同步 K 线数据后，根据机构研报的买入评级次数做二次过滤
enable_research_report_filter = true
# 买入评级最低次数（大于此值才保留，默认 1 表示至少有一次买入评级）
research_report_min_count = 1


[POSITION_SIZING]
# ── 仓位管理（自研多因子模型） ──
# 基于 Kelly 准则 + 风险平价 + 信号置信度的混合仓位算法
# 输出列"建议仓位比例" = 基础等级仓位 × Kelly 系数 × 调整系数
max_single_position = 0.33  # 单只股票最大仓位占总资产比例（0.33 = 33%）
# NOTE: kelly_fraction / position_a 已移至 [BACKTEST_CALIBRATED]
default_win_rate = 0.50     # 默认胜率假设（Kelly 公式中的 p 值）
position_b = 0.15           # B 级（偏多）基础仓位
position_c = 0.05           # C 级（多空拉锯）基础仓位
position_d = 0.00           # D 级（偏空）基础仓位，设为 0 表示不持仓
max_industry_exposure = 0.30 # 单一行业最大暴露比例（控制行业集中度）
risk_budget = 0.02          # 波动率风险预算：每笔交易承担价格风险不超过总资金 2%


[BACKTEST_CALIBRATED]
# ── 回测自动校准参数（Walk-Forward 寻优后自动覆写） ──
# 以下 7 个参数由回测引擎在 Walk-Forward 校准期间自动搜索最优值，
# 并写回本分区。日常运行无需手动修改。
# ⚠️ 手动修改后，下次回测校准会被覆写。
boll_narrow_ratio = 0.8     # 窄布林判定：带宽/历史均值 < 此值 → 震荡
cross_decay_days = 30       # 金叉信号衰减半衰期（天）
atr_stop_mult = 1.5         # ATR 止损倍数：止损价 = close - ATR × 此值
atr_t1_mult = 3.0           # T1 目标价 ATR 倍数（第一止盈位）
liq_veto_ratio = 0.05       # 流动性否决比：当日成交额低于 20 日均值 × 此值 → 否决
kelly_fraction = 0.25       # 半凯利系数：f_used = f_kelly × 此值
position_a = 0.30           # A 级（综合多头）基础仓位


[BACKTEST]
# ── 回测系统调度参数 ──
enabled = true                       # 是否启用定时回测寻优
full_a_share_mode = false            # 全 A 股模式：跳过主板/研报过滤全部 ~5000 只股票
optimize_frequency = monthly         # Walk-Forward 校准频率：monthly | quarterly | initial
backtest_start_date = 20230101       # 回测数据起始日期（YYYYMMDD）
out_of_sample_days = 60              # Walk-Forward 样本外验证窗口天数
initial_cash = 1000000               # 回测初始资金
signal_pipelines = 3                 # 信号预计算并行管道数（建议与 CPU 物理核心数相当）

# ── 待寻优参数网格搜索范围 (最小值,最大值,步长) ──
# 回测引擎在配置范围内遍历所有组合，选出最优参数后自动写入 config.ini 对应条目
atr_stop_mult_range = 1.0,3.0,0.5       # ATR 止损倍数：值越小止损越紧
atr_t1_mult_range = 2.0,6.0,1.0         # T1 目标价 ATR 倍数
kelly_fraction_range = 0.1,0.5,0.1      # 半凯利系数
position_a_range = 0.2,0.5,0.05         # A 级基础仓位
liq_veto_ratio_range = 0.03,0.10,0.01   # 流动性否决比
boll_narrow_ratio_range = 0.6,1.2,0.1   # 窄布林判定阈值
cross_decay_days_range = 15,60,5        # 金叉衰减半衰期
