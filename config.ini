# 是否只获取主板股票（true/false）
# true: 仅获取沪深主板 (60/00开头)
# false: 获取全市场 A 股 (含创业板、科创板、北交所)
main_board_only = true

[SYSTEM]
HOME_DIRECTORY = ~/Downloads/CoreNews_Reports
TEMP_DATA_DIR = .
max_workers = 15
data_fetch_retries = 3
data_fetch_delay = 5

[LOGGING]
log_level = INFO
log_dir = Logs

# ============================================================
# 【多头排列评分系统配置】
# 说明：用于判断股票趋势强度的评分阈值
# 评分范围：0-100分，分数越高表示多头排列越强
# ============================================================
[MULTI_HEAD_ARRANGEMENT]
# 完全主升浪阈值（85分以上）：最强多头排列，所有均线完美向上发散
# 适用场景：强势上涨行情中的核心持仓标的
full_bull_threshold = 85

# 趋势加速阈值（65-84分）：较强的多头排列，短期攻击力强
# 适用场景：突破关键压力位后的加速阶段
trend_acceleration_threshold = 65

# 趋势震荡阈值（45-64分）：中等强度，均线开始收敛或震荡
# 适用场景：横盘整理或温和上涨阶段
trend_oscillation_threshold = 45

# 趋势观望阈值（45分以下）：弱势或空头排列
# 适用场景：下跌趋势或无明显方向时
trend_watch_threshold = 45

# 均线周期配置（用于本地多头排列评分计算）
# 默认：5,10,20,30,60（5条均线）
# 说明：此配置用于计算系统本地下载的K线数据的“多头排列趋势评分”（如 FullBull_Score）
# 注意：周期数量不宜过多，建议3-5条
# ⚠️ 重要提示：此项配置并不影响 Akshare “均线突破”模块中的数据筛选（该模块由于依赖 Akshare API 接口，默认且只能固定为 10/30/60 日均线突破进行筛选）。
moving_average_periods = 5,10,20,30,60

# ============================================================
# 【弱势股过滤规则配置】
# 说明：自动剔除极度弱势且加速下跌的股票，避免踩雷
# 注意：满足豁免条件的股票即使符合弱势特征也不会被剔除
# ============================================================
[FILTER_RULES]
# 是否启用弱势股过滤（true/false）
enable_weak_stock_filter = true

# 豁免条件：具备以下趋势级别的股票不被过滤
# 可选值：完全主升, 趋势加速, 趋势震荡, 趋势观望
# 建议：保留"完全主升"和"趋势加速"，避免误删强势股
exempt_levels = 完全主升,趋势加速,趋势震荡,趋势观望

# ============================================================
# 【资金流分析配置】
# 说明：控制资金流入数据的统计周期和分析维度
# 注意：仅支持 3、5、10、20 日四个周期（akshare接口限制）
# ============================================================
[FUND_FLOW]
# 资金流统计周期（天数），用逗号分隔
# 可选值：3, 5, 10, 20（对应akshare的"3日排行"、"5日排行"等）
# 注意：必须设置三个周期才能有效观察资金趋势
# 允许的组合（仅限以下四种）：
#   - fund_flow_periods = 3,5,10     # 短中周期组合（推荐短线）
#   - fund_flow_periods = 3,5,20     # 短长周期组合
#   - fund_flow_periods = 5,10,20    # 中长周期组合（默认，推荐中线）
#   - fund_flow_periods = 3,10,20    # 分散周期组合
fund_flow_periods = 5,10,20

# ============================================================
# 【技术指标信号配置】
# 说明：控制各类技术指标的计算参数和信号生成规则
# 注意：MACD标准周期(12,26,9)为业界经典参数，强制保留不可修改
# ============================================================
[TECHNICAL_INDICATORS]
# MACD指标参数配置
# 标准MACD周期（固定不变）：快线=12, 慢线=26, 信号线=9
# 这是业界公认的经典参数，所有分析必须包含此周期
macd_standard_params = 12,26,9

# MACD第二周期（必填）：用户可以设置额外的MACD周期用于对比分析
# 默认：6,13,5（快速MACD，适合短线交易）
# 注意：此参数为必填项，不可设置为0,0,0
# 
# 推荐配置示例：
#   【短线交易】
#   - macd_second_params = 6,13,5       # 快速MACD（默认，响应最快）
#   - macd_second_params = 3,7,2        # 超快速MACD（适合日内交易）
# 
#   【中线波段】
#   - macd_second_params = 9,18,6       # 中速MACD（平衡型，适合波段操作）
#   - macd_second_params = 10,30,9      # EMA慢线调大至30，过滤噪音，震荡市更准确
#   - macd_second_params = 12,26,10    # 信号线调长，日线波段操作推荐
# 
#   【长线趋势】
#   - macd_second_params = 24,52,18     # 慢速MACD（适合中长线趋势跟踪）
#   - macd_second_params = 20,60,10     # 以MA60为基础，配合股价均线系统
#   - macd_second_params = 30,60,10     # 判断周线趋势，适合大级别中线波段
macd_second_params = 6,13,5

# ============================================================
# 【列名别名配置】
# 说明：定义不同数据源中列名的映射关系，统一标准化为目标列名
# 格式：别名1=目标列,别名2=目标列,...
# 注意：多个别名可以映射到同一个目标列
# ============================================================
[COLUMN_ALIASES]
# 股票代码列的别名映射
# 目标列：股票代码
code_aliases = 代码=股票代码,证券代码=股票代码,股票代码=股票代码

# 股票名称列的别名映射
# 目标列：股票简称
name_aliases = 名称=股票简称,股票名称=股票简称,股票简称=股票简称,简称=股票简称

# 价格列的别名映射
# 目标列：最新价
price_aliases = 最新价=最新价,现价=最新价,当前价格=最新价,今收盘=最新价,收盘=最新价,收盘价=最新价

# ============================================================
# 【研报过滤配置】
# 说明：控制是否使用机构研报数据进行二次过滤
# 注意：仅在全量获取K线数据后生效
# ============================================================
[RESEARCH_REPORT_FILTER]
# 是否启用研报过滤（true/false）
enable_research_report_filter = true

# 研报买入次数阈值（大于此值才保留）
# 默认：1（即至少有1次买入评级）
research_report_min_count = 1

# ============================================================
# 【K线数据获取配置】
# 说明：控制K线历史数据的获取时间范围
# ============================================================
[KLINE_DATA]
# K线数据获取天数（从当前交易日往前推算的天数）
# 默认：200天（约10个月的交易日）
# 建议范围：60-500天
kline_history_days = 200