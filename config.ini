[SYSTEM]
# ── 系统运行参数 ──
# 报告和缓存输出根目录
HOME_DIRECTORY = ~/Downloads/CoreNews_Reports
# 临时数据子目录（相对于 HOME_DIRECTORY）
TEMP_DATA_DIR = cache
# 数据获取最大并发线程数（并非越大越好，受 CPU 和网络带宽限制）
max_workers = 15
# 数据获取失败重试次数（如 AkShare 接口超时或返回空数据）
data_fetch_retries = 3
# 重试间隔秒数（指数退避的基数）
