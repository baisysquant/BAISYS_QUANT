# 股票基础信息缓存过期天数（超时后强制全量刷新申万行业数据）
stock_basic_info_expire_days = 30
# 技术指标信号处理进程数（默认自动检测 CPU 核心数，留空即用默认值）
# signal_processing_processes = 8


[LOGGING]
# ── 日志配置 ──
# 日志级别：DEBUG | INFO | WARNING | ERROR | CRITICAL
log_level = INFO
# 日志文件子目录（相对于 HOME_DIRECTORY）
log_dir = Logs


[COLUMN_ALIASES]
# ── 列名映射 ──
# 不同数据源的列名统一映射为目标列名。格式：别名1=目标列,别名2=目标列,...
# 通常在切换数据源或对接新接口时修改，日常运行无需调整
code_aliases = 代码=股票代码,证券代码=股票代码,股票代码=股票代码
name_aliases = 名称=股票简称,股票名称=股票简称,股票简称=股票简称,简称=股票简称
price_aliases = 最新价=最新价,现价=最新价,当前价格=最新价,今收盘=最新价,收盘=最新价,收盘价=最新价


