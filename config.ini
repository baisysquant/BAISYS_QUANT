# ============================================================
# 【市场状态分类参数 REGIME_DETECTION】
# 说明：控制 _detect_market_regime 中市场状态判定的阈值。
#       这些参数为纯自定义经验值，需根据回测结果调整。
# ============================================================
[REGIME_DETECTION]
# 窄布林判定阈值：近期 BOLL 带宽 / 历史平均带宽 < 此值 → 判定为震荡
# 默认 0.8：带宽收缩到历史均值的 80% 以下视为窄幅震荡
boll_narrow_ratio = 0.8

# 震荡模式柱状图标准差比：abs(柱状图.iloc[-1]) < 此值 × close.std() → 判定为震荡
# 默认 0.1：柱状图绝对值小于价格标准差的 10%
oscillation_hist_std_ratio = 0.1

# 顶风险 MA20 偏离阈值：(close - MA20) / MA20 > 此值 → 判定为顶部风险
# 默认 0.15：收盘价高于 MA20 超过 15%
top_risk_ma20_deviation = 0.15

# 震荡判定最小 K 线数（低于此数量不进入震荡模式）
# 默认 30
oscillation_min_bars = 30

# 反转检测回溯长度（底/顶反转判断时对比的 K 线根数）
# 默认 10
reversal_lookback = 10

# ============================================================
# 【背离检测参数 DIVERGENCE】
# 说明：控制背离信号检测和衰减的默认值。
#       信号衰减模型为自研，需根据回测调整。
# ============================================================
[DIVERGENCE]
# 背离检测基础窗口（adaptive_distance 的 base_distance）
# 默认 10：以 10 根 K 线为基数搜索极值点
base_distance = 10

# 背离有效强度门限：背离强度 > 此值才生成信号
# 默认 0.15
strength_threshold = 0.15

# 背离信号半衰期（天）：超过此天数后信号权重衰减 50%
# 默认 8 天
decay_half_life = 8

# DIF 斜率线性回归窗口（rolling 的 window 参数）
# 默认 5：使用最近 5 根 K 线拟合 DIF 斜率
slope_window = 5

# ============================================================
# 【评分计算参数 SCORING_PARAMS】
# 说明：控制评分计算中的衰减模型、波动率归一化、退出策略等。
#       这些参数为纯自定义，需根据回测调整。
# ============================================================
[SCORING_PARAMS]
# 金叉信号衰减半衰期（天）：金叉发生后此天数内权重线性衰减到下限
# 默认 30 天
cross_decay_days = 30

# 金叉衰减下限：衰减后权重不低于此比例
# 默认 0.3（原始权重的 30%）
cross_decay_min = 0.3

# K 线形态衰减半衰期（天）：形态出现后此天数内权重线性衰减到下限
# 默认 10 天
kline_decay_days = 10

# K 线形态衰减下限
# 默认 0.2（原始权重的 20%）
kline_decay_min = 0.2

# 金叉强度波动率归一化分母：(DIF - DEA) / ATR / 此值 → vol_factor
# 默认 0.15
vol_norm_denominator = 0.15

# 止损 ATR 倍数：止损价 = close - ATR × 此倍数
# 默认 1.5（行业常见范围 1.5 ~ 3.0）
atr_stop_mult = 1.5

# T1 目标价 ATR 倍数：T1 = close + ATR × 此倍数
# 默认 3.0
atr_t1_mult = 3.0

# T2 目标价 ATR 倍数：T2 = close + ATR × 此倍数
# 默认 5.0
atr_t2_mult = 5.0

# 移动止损高位触发比：close ≥ 近 20 日最高价 × 此值 → 激活移动止损
# 默认 0.98
trailing_stop_high_ratio = 0.98

# 移动止损回溯窗口：移动止损价 = 近 N 日最低价
# 默认 10 天
trailing_stop_lookback = 10

# 移动止损参考高点回溯窗口：用于判断是否处于近期高位
# 默认 20 天
trailing_stop_high_lookback = 20

# 预期盈亏比计算的回溯窗口：取近 N 日的价格区间
# 默认 20 天
expected_return_lookback = 20

# ============================================================
# 【标准技术指标参数 TECHNICAL_CONSTANTS】
# 说明：行业标准技术指标的计算周期，一般无需修改。
#       放在 config.ini 是为了统一入口方便对比调参。
# ============================================================
[TECHNICAL_CONSTANTS]
# ATR 计算周期
atr_length = 14
# ADX 计算周期
adx_length = 14
# RSI 计算周期
rsi_length = 14
# BOLL 计算周期
boll_length = 20
# BOLL 标准差倍数
boll_std = 2
# Stoch %K 周期
stoch_k = 9
# Stoch %D 平滑周期
stoch_d = 3
# K 线形态扫描窗口（根数）
kline_scan_window = 60

# ============================================================
# 【仓位管理参数 POSITION_SIZING】
# 说明：专业级多因子仓位管理模型，基于 Kelly 准则 + 风险平价 +
#       信号置信度的混合仓位算法（详见 LogicAnalyzer/PositionSizer.py）。
#       输出列"建议仓位比例"表示单只股票占总仓位的百分比（0~1）。
#       其中大部分为自研经验参数，需根据回测校准。
# ============================================================
# ============================================================
# 【回测系统参数 BACKTEST】
# 说明：控制 AKQuant 回测引擎的寻优调度与参数范围。
#       回测独立于每日管线运行，结果写入 calibration_result.json。
# ============================================================
[BACKTEST]
# 是否启用定时回测寻优
enabled = true
# 全 A 股模式：跳过主板/研报过滤，强制包含全部 ~5000 只股票
full_a_share_mode = true
# 优化频率：monthly / quarterly / initial
optimize_frequency = monthly
# 每次回测的数据起始日期（格式：YYYYMMDD），直接传给数据接口
backtest_start_date = 20230101

# 样本外验证天数
out_of_sample_days = 60
# 初始资金
initial_cash = 1000000

# ── 待寻优参数范围 (min, max, step) ──
# ATR 止损倍数：值越小止损越紧
atr_stop_mult_range = 1.0,3.0,0.5
# T1 目标价 ATR 倍数
atr_t1_mult_range = 2.0,6.0,1.0
# 半凯利系数
kelly_fraction_range = 0.1,0.5,0.1
# A 级基础仓位
position_a_range = 0.2,0.5,0.05
# 流动性否决阈值
liq_veto_ratio_range = 0.03,0.10,0.01
# 窄布林判定阈值
boll_narrow_ratio_range = 0.6,1.2,0.1
# 金叉衰减半衰期
cross_decay_days_range = 15,60,5

[POSITION_SIZING]
# 最大单只股票仓位（总资产比例，0~1）
# 默认 0.33：单票不超过总资金 33%（行业常见 20%~40%）
max_single_position = 0.33

# 半凯利系数：f_used = f_kelly × 此值
# 1.0 = 全凯利（激进，理论上增速最快但波动大）
# 0.25 = 半凯利的半凯利（保守，默认）
# 建议范围 0.25~0.50
kelly_fraction = 0.25

# 默认胜率假设（用于 Kelly 公式中的 p 值，0~1）
# 默认 0.50：假设系统胜率 50%（保守无偏估计）
# ⚠️ 自定义参数，需回测校准
default_win_rate = 0.50

# A 级基础仓位（综合级别 A，0~1）
# 默认 0.30：A 级信号最高仓位 30%
position_a = 0.30

# B 级基础仓位
# 默认 0.15
position_b = 0.15

# C 级基础仓位
# 默认 0.05
position_c = 0.05

# D 级基础仓位（此级别不持仓，设为 0）
# 默认 0.00
position_d = 0.00

# 最大行业集中度（单一行业占总仓位比例，0~1）
# 默认 0.30：任一行业不超过总资金 30%
# ⚠️ 此为逐行标注字段，外部组合管理器应据此约束
max_industry_exposure = 0.30

# 波动率风险预算（价格百分比，0~1）
# 默认 0.02：每笔交易承担的价格风险不超过总资金的 2%
# 行业标准：1%~3%
# 仓位上限 = 风险预算 / ATR%
risk_budget = 0.02

# 最大回撤缩减系数：当账户回撤超过阈值时，等比缩仓
# 默认 0.50：最大缩减 50%
# ⚠️ 此为外部风控参考字段，当前未自动触发
max_drawdown_reduction = 0.50